<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vòng quay học sinh - Chiếc Nón Kỳ Diệu</title>
<style>
  :root {
    --size: 480px;
    --border: 10px;
  }
  body{
    margin:0; font-family: system-ui, Arial, sans-serif; color:#1f2937;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 20%, #fff, #e6f0ff 60%, #d9e8ff);
  }
  h1{ margin:8px 0 0; font-size:22px; font-weight:800; letter-spacing:.2px}
  .wrap{ position:relative; width:var(--size); height:var(--size); margin:22px auto 8px; }
  canvas{
    width:100%; height:100%; display:block; border-radius:50%;
    box-shadow: 0 12px 30px rgba(0,0,0,.18), inset 0 0 0 var(--border) #111;
    cursor:pointer; background:#fff;
  }
  /* Mũi tên hướng xuống */
  .pointer{
    position:absolute; left:50%; top:-14px; transform:translateX(-50%);
    width:0; height:0;
    border-left: 22px solid transparent;
    border-right:22px solid transparent;
    border-top: 44px solid #e11d48; /* đỏ, hướng xuống */
    filter: drop-shadow(0 6px 6px rgba(0,0,0,.25));
    z-index:5;
  }
  .hint{ font-size:14px; opacity:.8; margin:6px 0 0 }
  .result{
    margin-top:10px; font-size:20px; font-weight:800; color:#0ea5e9;
    text-shadow: 0 1px 0 #fff;
  }
  .bar{
    width:min(560px, 92vw); height:10px; border-radius:999px; background:#e5e7eb; overflow:hidden; margin-top:10px;
  }
  .fill{ height:100%; width:0%; background:linear-gradient(90deg,#34d399,#22c55e); transition:width .1s; }
</style>
</head>
<body>
  <h1>🎡 VÒNG QUAY MAY MẮN</h1>
  <div class="wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="960" height="960" title="Nhấn & giữ để lấy lực, thả để quay"></canvas>
  </div>
  <div class="bar" aria-hidden="true"><div class="fill" id="chargeFill"></div></div>
  <div class="hint" id="hint">Giữ chuột (hoặc chạm giữ) vào vòng quay để lấy lực • Tối thiểu quay 5 giây</div>
  <div class="result" id="result" style="font-size: 36px"></div>
  <!-- Âm thanh -->
  <audio id="tickSound" src="vongquay.mp3" preload="auto"></audio>
  <audio id="winSound" src="chucmung.mp3" preload="auto"></audio>
<script src="danhsachhs.js"></script>
<script>
/* ======= CẤU HÌNH ======= */
	
	
/* Thay danh sách tên học sinh vào dây*/	

	
/*Kết thúc danh sách*/	
	
// tối đa tốc độ khi giữ (rad/khung hình ~ 60fps)
const MAX_ANGULAR_VEL = 0.45;
const ACCEL_PER_MS = 0.00028;     // tăng tốc khi đang giữ
const DECAY = 0.985;              // hệ số giảm tốc khi thả (mỗi khung)
const MIN_SPIN_MS =   5000;         // tối thiểu quay 5 giây
/* ======================== */

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const resultEl = document.getElementById('result');
const hintEl = document.getElementById('hint');
const chargeFill = document.getElementById('chargeFill');

const size = canvas.width;              // 960
const R = size/2;                       // 480
const arc = (2*Math.PI)/students.length;

let rotation = 0;                       // góc hiện tại (rad)
let omega = 0;                          // vận tốc góc (rad/frame)
let holding = false;                    // đang giữ để lấy lực
let spinning = false;                   // đang quay (sau khi thả)
let lastTime = 0;                       // timestamp khung trước
let holdStart = 0;                      // mốc thời gian bắt đầu giữ
let releaseStart = 0;                   // mốc thả chuột
let lastIndexUnderPointer = -1;         // để phát tick khi đổi ô

/* ========= ÂM THANH (Web Audio – không cần file) ========= */
let audioCtx;
function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playTick1() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1400, t0);
  osc.frequency.exponentialRampToValueAtTime(900, t0 + 0.04); // xuống nhanh
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(0.25, t0 + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + 0.07);
}
function playWin1() {
  if (!audioCtx) return;
  const rootT = audioCtx.currentTime;
  // arpeggio C–E–G (C5,E5,G5)
  const notes = [523.25, 659.25, 783.99];
  notes.forEach((freq, i) => {
    const t0 = rootT + i * 0.12;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.35, t0 + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.42);
  });
}
function playTick() {
  //tickSound.currentTime = 0; // tua về đầu để có thể phát liên tiếp
  tickSound.play();
}

function playWin() {
  winSound.currentTime = 0;
  winSound.play();
}
function stopTick() {
  tickSound.pause();
  tickSound.currentTime = 0;
}	
	
function fadeOut(audio, duration = 3000) {
  if (!audio) return;
  let step = audio.volume / (duration / 100); // giảm mỗi 100ms
  let fade = setInterval(() => {
    if (audio.volume - step > 0) {
      audio.volume = Math.max(0, audio.volume - step);
    } else {
      audio.pause();
      audio.currentTime = 0;
      audio.volume = 1; // reset lại volume để lần sau phát bình thường
      clearInterval(fade);
    }
  }, 100);
}	
/* ========================================================= */

/* Vẽ vòng quay */
function drawWheel() {
  ctx.clearRect(0,0,size,size);
  // nền viền trong
  ctx.save();
  ctx.translate(R, R);
  ctx.rotate(rotation);

  for (let i=0;i<students.length;i++){
    const start = i*arc;
    const end = start + arc;
    // màu rực rỡ theo HSL
    const hue = Math.round(i * (360/students.length));
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,R-8, start, end);
    ctx.closePath();
    ctx.fillStyle = `hsl(${hue} 85% 55%)`;
    ctx.fill();

    // đường phân cách
    ctx.strokeStyle = 'rgba(255,255,255,.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0,0,R-8,start,end);
    ctx.stroke();

    // label
    ctx.save();
    ctx.rotate(start + arc/2);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px system-ui, Arial';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.35)';
    ctx.shadowBlur = 4;
    ctx.fillText(students[i], R-26, 0);
    ctx.restore();
  }
  // nắp trung tâm
  ctx.beginPath();
  ctx.arc(0,0,38,0,2*Math.PI);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0,0,28,0,2*Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.restore();
}

/* Lấy index tại hướng mũi tên (mũi tên ở TOP, chỉ xuống) */
function indexUnderPointer(rot){
  // công thức tương thích với mũi tên top: +90deg
  const degrees = rot * 180/Math.PI + 90;
  const arcd = arc * 180/Math.PI;
  let idx = Math.floor((360 - ((degrees % 360)+360)%360) / arcd);
  idx = (idx % students.length + students.length) % students.length;
  return idx;
}

/* Vòng lặp khung hình */
function tick(ts){
  if (!lastTime) lastTime = ts;
  const dt = Math.min(32, ts - lastTime); // ms, clamp để ổn định
  lastTime = ts;

  // nếu đang giữ: tăng tốc theo thời gian giữ
  if (holding){
    omega += ACCEL_PER_MS * dt;
    if (omega > MAX_ANGULAR_VEL) omega = MAX_ANGULAR_VEL;
  }else if (spinning){
    // giảm tốc
    omega *= DECAY;
    // đảm bảo quay tối thiểu MIN_SPIN_MS
    const elapsedSinceRelease = performance.now() - releaseStart;
    const minReached = elapsedSinceRelease >= MIN_SPIN_MS;
    const belowThreshold = omega < 0.0022;
    if (minReached && belowThreshold){
      omega = 0;
      spinning = false;
      // tính kết quả
      const idx = indexUnderPointer(rotation);
      const winner = students[idx];
	  
	  hintEl.textContent = 'Nhấn & giữ để lấy lực, thả để quay';
	  upper = `🎉 Chúc mừng: ${winner}!`;	
	  upper1 = upper.toUpperCase();	
      resultEl.textContent = upper1;
	  fadeOut(tickSound, 2000);
      playWin();
    }
  }

  // cập nhật góc
  if (omega !== 0){
    rotation = (rotation + omega) % (2*Math.PI);
  }

  // tick sound khi đổi ô
  const currIdx = indexUnderPointer(rotation);
  if (currIdx !== lastIndexUnderPointer){
    // phát tick khi đang quay đủ nhanh
    if (omega > 0.03) playTick();
    lastIndexUnderPointer = currIdx;
  }

  drawWheel();
  requestAnimationFrame(tick);
}

/* Sự kiện tương tác */
function onHoldStart(e){
  e.preventDefault();
  ensureAudioCtx();
  if (spinning) return;
  holding = true;
  holdStart = performance.now();
  resultEl.textContent = '';
  hintEl.textContent = 'Đang lấy lực… thả ra để quay!';
 MIN_SPIN_MS=  (rand.nextInt(12 - 8 + 1) + 8)*1000; 	
}
function onHoldEnd(e){
  e && e.preventDefault();
  if (!holding) return;
  holding = false;
  spinning = true;
  releaseStart = performance.now();
  hintEl.textContent = 'Đang quay…';
}

// Chuột
canvas.addEventListener('mousedown', onHoldStart);
window.addEventListener('mouseup', onHoldEnd);
canvas.addEventListener('mouseleave', (e)=> holding && onHoldEnd(e));
// Cảm ứng
canvas.addEventListener('touchstart', onHoldStart, {passive:false});
window.addEventListener('touchend', onHoldEnd, {passive:false});

// Thanh hiển thị “lấy lực”
setInterval(()=>{
  const pct = Math.min(100, Math.round((omega / MAX_ANGULAR_VEL)*100));
  chargeFill.style.width = (holding ? pct : 0) + '%';
}, 60);

/* Khởi động */
drawWheel();
requestAnimationFrame(tick);
</script>
</body>
</html>
